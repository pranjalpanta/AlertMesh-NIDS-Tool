# Nepal Corporate Network - Snort Configuration
# Network-Based Intrusion Alert System with Advanced IP Logging for Corporate Offices in Nepal

# ==============================================================================
# NETWORK VARIABLES
# ==============================================================================

# Default home network. start_snort_windows.bat overrides this from
# SNORT_HOME_NET or the first PROTECTED_NETWORKS entry in .env.
ipvar HOME_NET 192.168.1.0/24

# External network (everything else)
ipvar EXTERNAL_NET !$HOME_NET

# Common monitored service ports are defined directly in local.rules.

# ==============================================================================
# PATH CONFIGURATION
# ==============================================================================

# Path to rules directory. Keep this relative to the directory where Snort is
# launched. The Windows helper script runs from this src directory.
var RULE_PATH .

# Include local rules
include $RULE_PATH/local.rules

# ==============================================================================
# DECODER AND PREPROCESSOR CONFIGURATION
# ==============================================================================

# Disable decode alerts to reduce noise
config disable_decode_alerts

# Configure detection engine
config detection: search-method ac-bnfa

# ==============================================================================
# FRAGMENTATION PREPROCESSORS
# ==============================================================================

# Frag3 - IP defragmentation
preprocessor frag3_global: max_frags 65536
preprocessor frag3_engine: policy windows detect_anomalies

# ==============================================================================
# STREAM REASSEMBLY PREPROCESSORS
# ==============================================================================

# Stream5 - TCP stream reassembly
preprocessor stream5_global: track_tcp yes, track_udp yes, track_icmp no
preprocessor stream5_tcp: policy windows, use_static_footprint_sizes
preprocessor stream5_udp: timeout 30

# ==============================================================================
# OUTPUT CONFIGURATION
# ==============================================================================

# Alert to file (fast format)
output alert_fast: alert.ids

# Alert to syslog (uncomment if needed)
# output alert_syslog: host=logserv local0 LOG_AUTH LOG_ALERT

# Unified logging (for analysis tools)
# output log_unified: filename snort.unified, limit 128
# output alert_unified: filename snort.alert.unified, limit 128

# ==============================================================================
# RULE THRESHOLDING
# ==============================================================================

# Per-rule thresholds are defined in local.rules.

# ==============================================================================
# PERFORMANCE TUNING
# ==============================================================================

# Configure event queue
config event_queue: max_queue 8 log 3

# ==============================================================================
# END OF CONFIGURATION
# ==============================================================================
